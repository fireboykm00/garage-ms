# =============================================================================
# PRODUCTION PROFILE - Overrides application.properties when spring.profiles.active=prod
# =============================================================================

# Server
server.port=8080

# ---------------------------------------------------------------------------
# MySQL Database (ALL values overrideable via environment variables)
# ---------------------------------------------------------------------------
# Set via: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/garage_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:garage_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
# In production, use 'none' and manage schema via the provided SQL DDL
# (see deploy/db/schema.sql). Set to 'update' only if you're comfortable
# with Hibernate auto-migrating the schema.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Disable Open-in-View to avoid LazyInitializationExceptions leaking into views
spring.jpa.open-in-view=false

# ---------------------------------------------------------------------------
# H2 (disabled in prod)
# ---------------------------------------------------------------------------
spring.h2.console.enabled=false

# ---------------------------------------------------------------------------
# JWT
# ---------------------------------------------------------------------------
# Set via: APP_JWT_SECRET
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}
app.jwt.issuer=${APP_JWT_ISSUER:garage-app}
app.jwt.audience=${APP_JWT_AUDIENCE:garage-client}

# ---------------------------------------------------------------------------
# CORS - the public URL of your deployed frontend
# ---------------------------------------------------------------------------
# Set via: APP_FRONTEND_URL
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# ---------------------------------------------------------------------------
# Logging (less verbose in production)
# ---------------------------------------------------------------------------
logging.level.root=WARN
logging.level.com.garage=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
