# =============================================================================
# PRODUCTION PROFILE - Overrides application.properties when spring.profiles.active=prod
# =============================================================================

# Server
server.port=8080

# ---------------------------------------------------------------------------
# TiDB Cloud Database (MySQL 8.0 wire-compatible)
# All values overrideable via environment variables.
# ---------------------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://gateway01.eu-central-1.prod.aws.tidbcloud.com:4000/garage_db?sslMode=VERIFY_IDENTITY&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ---------------------------------------------------------------------------
# H2 (disabled in prod)
# ---------------------------------------------------------------------------
spring.h2.console.enabled=false

# ---------------------------------------------------------------------------
# JWT
# ---------------------------------------------------------------------------
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}
app.jwt.issuer=${APP_JWT_ISSUER:garage-app}
app.jwt.audience=${APP_JWT_AUDIENCE:garage-client}

# ---------------------------------------------------------------------------
# CORS - the public URL of your deployed frontend
# ---------------------------------------------------------------------------
app.frontend.url=${APP_FRONTEND_URL}

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging.level.root=WARN
logging.level.com.garage=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
