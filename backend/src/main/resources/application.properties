spring.profiles.active=dev

server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always
server.error.whitelabel.enabled=false

app.frontend.url=http://localhost:5173

spring.datasource.url=jdbc:h2:mem:garagedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

spring.sql.init.mode=never

app.jwt.secret=garage-secret-key-change-this-in-production-minimum-32-chars
app.jwt.expiration=86400000
app.jwt.issuer=garage-app
app.jwt.audience=garage-client

logging.level.root=INFO
logging.level.com.garage=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
