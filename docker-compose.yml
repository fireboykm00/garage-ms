version: '3.8'

services:
  ecrs:
    build: .
    ports:
      - "80:80"
      - "8080:8080"
    environment:
      - JWT_SECRET=ecommerce-secret-key-change-this-in-production
      - JWT_EXPIRATION=86400000
      - JWT_ISSUER=ecommerce-app
      - JWT_AUDIENCE=ecommerce-client
    volumes:
      - ecrs-data:/app/data
    restart: unless-stopped

volumes:
  ecrs-data: